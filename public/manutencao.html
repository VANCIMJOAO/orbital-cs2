<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Em manutenção — ORBITAL ROXA</title>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; }
    body {
      background: #0A0A0A;
      color: #F4F2F7;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }
    .wrap { max-width: 520px; }
    .badge {
      width: 64px; height: 64px; margin: 0 auto 28px;
      border-radius: 50%; border: 2px solid #7C5CFF;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 50px -8px #7C5CFF; font-size: 28px;
    }
    .kicker {
      font-size: 12px; letter-spacing: 0.28em; text-transform: uppercase;
      color: #7C5CFF; font-weight: 700; margin-bottom: 14px;
    }
    h1 {
      font-size: clamp(2rem, 6vw, 3.2rem); line-height: 1.05;
      margin: 0 0 16px; text-transform: uppercase; letter-spacing: -0.01em;
    }
    p { color: #A8A5B2; font-size: 1rem; line-height: 1.6; margin: 0 0 28px; }
    a.cta {
      display: inline-block; padding: 12px 28px; background: #7C5CFF;
      color: #0A0A0A; font-weight: 700; font-size: 13px;
      letter-spacing: 0.12em; text-transform: uppercase; text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="badge">🛠️</div>
    <div class="kicker">ORBITAL ROXA</div>
    <h1>Em manutenção</h1>
    <p>Estamos ajustando uns detalhes da plataforma. Já voltamos — enquanto isso, acompanha a gente no Instagram.</p>
    <a class="cta" href="https://instagram.com/orbitalroxa.gg" target="_blank" rel="noopener noreferrer">@orbitalroxa.gg</a>
  </div>
</body>
</html>
